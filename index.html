<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Warning</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f3460 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
        animation: pulse 8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.1); opacity: 0.5; }
      }

      main {
        position: relative;
        z-index: 1;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border: 2px solid rgba(16, 185, 129, 0.3);
        border-radius: 20px;
        padding: 50px 40px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                    0 0 40px rgba(16, 185, 129, 0.2);
        animation: slideIn 0.8s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        color: #10b981;
        text-align: center;
        font-size: 2rem;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        animation: glow 2s ease-in-out infinite;
      }

      @keyframes glow {
        0%, 100% { text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        50% { text-shadow: 0 0 30px rgba(16, 185, 129, 0.8); }
      }

      p {
        color: #cbd5e1;
        text-align: center;
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .qr-container {
        display: flex;
        justify-content: center;
        margin: 40px 0;
        position: relative;
      }

      .qr-container::before {
        content: '';
        position: absolute;
        width: 320px;
        height: 320px;
        background: linear-gradient(45deg, #10b981, #3b82f6);
        border-radius: 10px;
        filter: blur(20px);
        opacity: 0.3;
        animation: rotate 10s linear infinite;
      }

      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      img {
        position: relative;
        z-index: 1;
        border: 3px solid #10b981;
        border-radius: 10px;
        padding: 10px;
        background: white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      img:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
      }

      a {
        color: #3b82f6;
        text-decoration: none;
        position: relative;
        transition: color 0.3s ease;
        word-break: break-all;
      }

      a::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -2px;
        left: 0;
        background: linear-gradient(90deg, #10b981, #3b82f6);
        transition: width 0.3s ease;
      }

      a:hover {
        color: #10b981;
      }

      a:hover::after {
        width: 100%;
      }

      .scan-line {
        position: absolute;
        width: 2px;
        height: 100%;
        background: linear-gradient(180deg, transparent, #10b981, transparent);
        animation: scan 3s ease-in-out infinite;
        opacity: 0.5;
      }

      @keyframes scan {
        0%, 100% { left: 0%; }
        50% { left: 100%; }
      }

      @media (max-width: 768px) {
        main {
          padding: 30px 20px;
        }

        h1 {
          font-size: 1.5rem;
        }

        p {
          font-size: 1rem;
        }

        .qr-container::before {
          width: 280px;
          height: 280px;
        }

        img {
          max-width: 250px;
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="scan-line"></div>
    <main>
      <h1>QR code vers la page d'avertissement</h1>
      <p>Scannez ce QR code pour ouvrir la page web demandée.</p>
      <div class="qr-container">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https%3A%2F%2Fnilujien.github.io%2FQRWarning%2Fwarning.html"
          alt="QR code vers la page d'avertissement"
        />
      </div>
      <p>
        Lien direct:
        <a href="https://nilujien.github.io/QRWarning/warning.html">
          https://nilujien.github.io/QRWarning/warning.html
        </a>
      </p>
    </main>
  </body>
</html>
