<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avertissement de sécurité</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a0000 0%, #2d0a0a 50%, #4a0000 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background:
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(255, 0, 0, 0.03) 2px,
            rgba(255, 0, 0, 0.03) 4px
          );
        animation: scanlines 10s linear infinite;
      }

      @keyframes scanlines {
        0% { transform: translateY(0); }
        100% { transform: translateY(20px); }
      }

      body::after {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(239, 68, 68, 0.15) 0%, transparent 70%);
        animation: pulse 4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(1.2); opacity: 0.6; }
      }

      main {
        position: relative;
        z-index: 1;
        background: rgba(20, 5, 5, 0.85);
        backdrop-filter: blur(10px);
        border: 3px solid rgba(239, 68, 68, 0.5);
        border-radius: 20px;
        padding: 60px 50px;
        max-width: 800px;
        width: 100%;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.7),
          0 0 80px rgba(239, 68, 68, 0.3),
          inset 0 0 60px rgba(239, 68, 68, 0.1);
        animation: slideIn 0.8s ease-out, borderPulse 2s ease-in-out infinite;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes borderPulse {
        0%, 100% {
          border-color: rgba(239, 68, 68, 0.5);
          box-shadow:
            0 20px 60px rgba(0, 0, 0, 0.7),
            0 0 80px rgba(239, 68, 68, 0.3),
            inset 0 0 60px rgba(239, 68, 68, 0.1);
        }
        50% {
          border-color: rgba(239, 68, 68, 0.8);
          box-shadow:
            0 20px 60px rgba(0, 0, 0, 0.7),
            0 0 100px rgba(239, 68, 68, 0.5),
            inset 0 0 80px rgba(239, 68, 68, 0.2);
        }
      }

      .warning-icon {
        text-align: center;
        font-size: 5rem;
        margin-bottom: 30px;
        animation: iconBlink 1.5s ease-in-out infinite;
      }

      @keyframes iconBlink {
        0%, 100% {
          opacity: 1;
          filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.8));
        }
        50% {
          opacity: 0.5;
          filter: drop-shadow(0 0 40px rgba(239, 68, 68, 1));
        }
      }

      h1 {
        color: #ef4444;
        text-align: center;
        font-size: 2.5rem;
        margin-bottom: 40px;
        text-transform: uppercase;
        letter-spacing: 3px;
        text-shadow:
          0 0 30px rgba(239, 68, 68, 0.8),
          0 0 60px rgba(239, 68, 68, 0.5),
          0 2px 4px rgba(0, 0, 0, 0.8);
        animation: glow 1.5s ease-in-out infinite;
        line-height: 1.3;
      }

      @keyframes glow {
        0%, 100% {
          text-shadow:
            0 0 30px rgba(239, 68, 68, 0.8),
            0 0 60px rgba(239, 68, 68, 0.5),
            0 2px 4px rgba(0, 0, 0, 0.8);
        }
        50% {
          text-shadow:
            0 0 40px rgba(239, 68, 68, 1),
            0 0 80px rgba(239, 68, 68, 0.7),
            0 2px 4px rgba(0, 0, 0, 0.8);
        }
      }

      .alert-bars {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 40px;
      }

      .bar {
        width: 60px;
        height: 6px;
        background: linear-gradient(90deg, #dc2626, #ef4444);
        border-radius: 3px;
        animation: barPulse 1s ease-in-out infinite;
      }

      .bar:nth-child(1) { animation-delay: 0s; }
      .bar:nth-child(2) { animation-delay: 0.2s; }
      .bar:nth-child(3) { animation-delay: 0.4s; }
      .bar:nth-child(4) { animation-delay: 0.6s; }
      .bar:nth-child(5) { animation-delay: 0.8s; }

      @keyframes barPulse {
        0%, 100% {
          opacity: 0.3;
          transform: scaleY(1);
        }
        50% {
          opacity: 1;
          transform: scaleY(1.5);
          box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
        }
      }

      .corner-decoration {
        position: absolute;
        width: 40px;
        height: 40px;
        border: 2px solid #ef4444;
      }

      .corner-decoration.top-left {
        top: 20px;
        left: 20px;
        border-right: none;
        border-bottom: none;
      }

      .corner-decoration.top-right {
        top: 20px;
        right: 20px;
        border-left: none;
        border-bottom: none;
      }

      .corner-decoration.bottom-left {
        bottom: 20px;
        left: 20px;
        border-right: none;
        border-top: none;
      }

      .corner-decoration.bottom-right {
        bottom: 20px;
        right: 20px;
        border-left: none;
        border-top: none;
      }

      .glitch {
        position: relative;
        animation: glitchText 3s infinite;
      }

      @keyframes glitchText {
        0%, 90%, 100% { transform: translate(0); }
        91% { transform: translate(-2px, 2px); }
        92% { transform: translate(2px, -2px); }
        93% { transform: translate(-2px, -2px); }
        94% { transform: translate(2px, 2px); }
        95% { transform: translate(0); }
      }

      @media (max-width: 768px) {
        main {
          padding: 40px 30px;
        }

        .warning-icon {
          font-size: 3.5rem;
        }

        h1 {
          font-size: 1.8rem;
          letter-spacing: 2px;
        }

        .bar {
          width: 40px;
          height: 5px;
        }

        .corner-decoration {
          width: 30px;
          height: 30px;
        }
      }

      @media (max-width: 480px) {
        main {
          padding: 30px 20px;
        }

        .warning-icon {
          font-size: 2.5rem;
        }

        h1 {
          font-size: 1.4rem;
          letter-spacing: 1px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>

      <div class="warning-icon">⚠️</div>
      <h1 class="glitch">Attention, vos données ne sont pas en sécurité</h1>

      <div class="alert-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </main>
  </body>
</html>
